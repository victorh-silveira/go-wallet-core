name: 'Ação de Release Automática'
description: 'Gera tags e releases baseado no histórico de commits via semantic-release (Go contextual)'
inputs:
  github_token:
    description: 'Token do GitHub'
    required: true

runs:
  using: "composite"
  steps:
    - name: "Configurar Node.js"
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: "Executar Semantic Release"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        SR=$(mktemp -d)
        cd "$SR"
        npm init -y >/dev/null 2>&1
        npm install --no-save --no-audit --no-fund \
          semantic-release@24 \
          @semantic-release/commit-analyzer \
          @semantic-release/release-notes-generator \
          @semantic-release/changelog \
          @semantic-release/git \
          @semantic-release/github \
          conventional-changelog-conventionalcommits

        cd "${GITHUB_WORKSPACE}"
        export NODE_PATH="${SR}/node_modules${NODE_PATH:+:${NODE_PATH}}"
        "$SR/node_modules/.bin/semantic-release" --extends ./tools/releaserc.json
