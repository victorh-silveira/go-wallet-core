name: 'Ação de Release Automática'
description: 'Gera tags e releases baseado no histórico de commits via semantic-release (Go contextual)'
inputs:
  github_token:
    description: 'Token do GitHub'
    required: true

runs:
  using: "composite"
  steps:
    - name: "Configurar Go"
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: "Configurar Node.js"
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: "Instalar dependencias do semantic-release"
      shell: bash
      run: npm ci --prefix tools

    - name: "Executar Semantic Release"
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Binario e plugins no mesmo node_modules (tools/) para resolucao de modulos
        ./tools/node_modules/.bin/semantic-release --extends ./tools/releaserc.json
