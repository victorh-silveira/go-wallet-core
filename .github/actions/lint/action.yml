name: Lint Go
description: Go 1.26 — go fmt, go vet, go mod tidy (check), golangci-lint

runs:
  using: composite

  steps:
    - name: Configurar Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"
        cache: true

    - name: Verificar formatacao (go fmt)
      shell: bash
      run: |
        if [ -n "$(go fmt ./...)" ]; then
          echo "::error::Arquivos nao formatados. Rode: go fmt ./..."
          exit 1
        fi

    - name: Go vet
      shell: bash
      run: go vet ./...

    - name: Modulos (download e verify)
      shell: bash
      run: |
        go mod download
        go mod verify

    - name: golangci-lint
      shell: bash
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        "$(go env GOPATH)/bin/golangci-lint" run ./... --timeout=5m
