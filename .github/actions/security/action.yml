name: 'Ação de Segurança Go'
description: 'Executa gosec e govulncheck'
runs:
  using: "composite"
  steps:
    - name: "Configurar Go"
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'
        cache: true

    - name: "Instalar Ferramentas e Dependências"
      shell: bash
      run: |
        go install github.com/securego/gosec/v2/cmd/gosec@latest
        go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: "Executar Gosec (Análise Estática de Segurança)"
      shell: bash
      run: gosec ./...

    - name: "Executar Govulncheck (Scan de Vulnerabilidades)"
      shell: bash
      run: govulncheck ./...
