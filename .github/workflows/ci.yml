name: "Pipeline de CI"

on:
  push:
    branches: [ main ]
    paths:
      - '.github/**'
      - 'go.mod'
      - 'go.sum'
      - 'scripts/**'
      - 'src/**'
      - 'tools/**'

  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Auditoria de Qualidade"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout do Código"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Auditoria de Qualidade de Código"
        uses: ./.github/actions/lint

  tests:
    name: "Suite de Testes"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout do Código"
        uses: actions/checkout@v4

      - name: "Executar Testes Automatizados"
        uses: ./.github/actions/test

  security:
    name: "Scan de Segurança"
    needs: [lint, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout do Código"
        uses: actions/checkout@v4

      - name: "Scan de Segurança e Vulnerabilidades"
        uses: ./.github/actions/security
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: "Release Automática"
    needs: [security]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: "Checkout do Código"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Sincronizar e Limpar Tags"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Limpando tags locais para evitar conflitos..."
          git tag -l | xargs -n 1 git tag -d || true
          
          echo "Sincronizando com o remoto..."
          git fetch --tags --force --prune
          
          echo "Analisando tags órfãs (não pertencentes ao histórico de main)..."
          for tag in $(git tag -l "v*"); do
            if ! git merge-base --is-ancestor "$tag" main 2>/dev/null; then
              echo ">> Deletando tag órfã detectada no remoto: $tag"
              git push origin --delete "$tag" || true
              git tag -d "$tag" || true
            fi
          done

      - name: "Release Automática"
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

