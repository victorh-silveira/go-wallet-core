name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/**"
      - "go.mod"
      - "go.sum"
      - "README.md"
      - "docs/**"
      - "config/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "api/**"
      - "tools/**"
      - "commitlint.config.mjs"
      - ".releaserc.json"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Qualidade — Lint Go
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Lint
        uses: ./.github/actions/lint

  tests:
    name: Testes — Go
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Testes
        uses: ./.github/actions/test

  security:
    name: Segurança — Go
    needs: [quality, tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Segurança
        uses: ./.github/actions/security
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Release — Versão
    needs: [security]

    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Tags
        uses: ./.github/actions/sync-tags
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release
        uses: ./.github/actions/release
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
