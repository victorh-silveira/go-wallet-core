minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: clean-workspace
        name: Validar qualidade e seguranca (fmt, vet, tidy, lint, gosec, govulncheck)
        entry: go run ./scripts/core/clean_workspace.go
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: commitlint
        name: Validar mensagem de commit (conventional commits)
        entry: npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint --config tools/commitlint.config.mjs --edit
        language: system
        stages: [commit-msg]

      - id: go-test
        name: Executar testes automatizados (go test)
        entry: go test ./...
        language: system
        pass_filenames: false
        stages: [pre-commit]
