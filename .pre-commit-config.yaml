minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: Segurança — Gitleaks (tokens e segredos)

  - repo: local
    hooks:
      - id: clean-workspace
        name: Qualidade — lint, segurança e docs (clean_workspace)
        entry: go run ./scripts/core/clean_workspace.go
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: go-test
        name: Testes — go test (suite em tests/)
        entry: go test ./...
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: commitlint
        name: Mensagem de commit — Commitlint (Conventional Commits)
        entry: npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint --config tools/commitlint.config.mjs --edit
        language: system
        stages: [commit-msg]
