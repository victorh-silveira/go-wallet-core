openapi: 3.0.3
info:
  title: Go Wallet Core API
  description: |
    API de carteira digital (wallet e ledger).
    Valores monetarios sao sempre em **centavos** (inteiro): 1 real = 100 centavos (ex.: R$ 250,50 = 25050).
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Servidor Local

paths:
  /health:
    get:
      summary: Health Check
      description: Verifica o status de saude da aplicacao.
      responses:
        '200':
          description: Sistema operacional
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                    example: 1.0.0

  /users:
    post:
      summary: Criar Usuario
      description: Registra um novo usuario no sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
                - email
              properties:
                id:
                  type: string
                  example: "USER-001"
                name:
                  type: string
                  example: "Victor Silveira"
                email:
                  type: string
                  example: "victor@teste.com"
      responses:
        '201':
          description: Usuario criado com sucesso
        '400':
          description: Requisicao invalida
        '422':
          description: Erro de validacao de negocio

  /wallet/transaction:
    post:
      summary: Processar Transacao
      description: |
        Registra debito ou credito. O campo `amount` e o saldo retornado `new_balance`
        estao em **centavos** (inteiro).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - account_id
                - type
                - amount
                - description
              properties:
                account_id:
                  type: string
                  example: "ACC-001"
                type:
                  type: string
                  enum: [DEBIT, CREDIT]
                  example: "CREDIT"
                amount:
                  type: integer
                  format: int64
                  description: Valor em centavos (sempre positivo)
                  example: 25050
                description:
                  type: string
                  example: "Pagamento de Aluguel"
      responses:
        '200':
          description: Transacao processada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  new_balance:
                    type: integer
                    format: int64
                    description: Saldo apos a transacao, em centavos
                    example: 75050
        '400':
          description: Tipo ou valor invalido
        '404':
          description: Conta nao encontrada
        '422':
          description: Saldo insuficiente ou erro de negocio
